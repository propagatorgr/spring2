<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <title>Κατακόρυφη Ταλάντωση με Ελατήριο</title>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== CANVAS ===== */
    #sketch-holder {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* ===== CONTROL + ENERGY PANEL ===== */
    #panel {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 15px;
      background: #111;
      box-sizing: border-box;
    }

    /* ===== CONTROLS ===== */
    #controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control {
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    label {
      margin-bottom: 4px;
      color: #ccc;
    }

    input[type=range] {
      width: 100%;
    }

    button {
      padding: 10px;
      font-size: 15px;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #readout {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #333;
      font-size: 15px;
      line-height: 1.4;
    }

    /* ===== ENERGY PANEL ===== */
    #energy {
      background: #161616;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #energy h3 {
      margin: 0 0 10px 0;
      font-weight: normal;
    }

    .bar-container {
      width: 80px;
      height: 200px;
      border: 1px solid #aaa;
      position: relative;
      margin-bottom: 10px;
    }

    .bar {
      position: absolute;
      bottom: 0;
      width: 100%;
    }

    .U {
      background: rgb(220,80,80);
    }

    .K {
      background: rgb(80,150,255);
    }

    .E {
      border: 2px solid #fff;
      position: absolute;
      bottom: 0;
      width: 100%;
    }

    #energy-values {
      font-size: 13px;
      line-height: 1.4;
      align-self: flex-start;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 800px) {
      #panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- CANVAS -->
  <div id="sketch-holder"></div>

  <!-- CONTROLS + ENERGY -->
  <div id="panel">

    <div id="controls"></div>

    <div id="energy">
      <h3>Ενεργειακή Ανάλυση</h3>

      <div class="bar-container">
        <div id="Ubar" class="bar U"></div>
        <div id="Kbar" class="bar K"></div>
        <div id="Ebar" class="E"></div>
      </div>

      <div id="energy-values">
        U = 0.00 J<br>
        K = 0.00 J<br>
        E = 0.00 J
      </div>
    </div>

  </div>

  <script src="sketch.js"></script>

</body>
</html>
